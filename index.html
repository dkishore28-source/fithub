<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        /* Banner */
        .banner {
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        /* Products */
        .products {
            padding: 20px;
            text-align: center;
        }

        .product-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .product {
            border: 1px solid #ccc;
            padding: 15px;
            width: 200px;
            border-radius: 5px;
        }

        .product img {
            width: 100%;
        }

        .product button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .product button:hover {
            background: darkgreen;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

</head>
<body>

    <!-- Header -->
    <header>
        <h1>fitness hub</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Welcome to fitness hub</h2>
        <p>Best Products at Best Prices</p>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Our Products</h2>
        <div class="product-container">

            <div class="product">
                <img src="Optimum-Nutrition.webp" alt="Product 1">
                <h3>optimum nutrition</h3>
                <p> $3120</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="c:\Users\Kishore\HTML\avvatar.webp" alt="Product 2">
                <h3>Avvatar</h3>
                <p>₹2550</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="MuscleBlaze-Biozyme-Whey-Protein-.jpg" alt="Product 3">
                <h3>muscle blaze</h3>
                <p>₹3150</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 fitness hub | All Rights Reserved</p>
    </footer>

</body>
</html>
